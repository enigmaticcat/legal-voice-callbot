services:

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - callbot

  qdrant-restore:
    image: curlimages/curl:8.7.1
    depends_on:
      - qdrant
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-nutrition_articles}
      - QDRANT_SNAPSHOT_FILE=${QDRANT_SNAPSHOT_FILE:-nutrition_articles.snapshot}
      - QDRANT_SNAPSHOT_PRIORITY=${QDRANT_SNAPSHOT_PRIORITY:-snapshot}
    volumes:
      - ./snapshots:/snapshots:ro
    command: >
      sh -c ' set -eu; SNAP="/snapshots/$${QDRANT_SNAPSHOT_FILE}"; until curl -fsS "$${QDRANT_URL}/healthz" >/dev/null; do sleep 2; done; if [ ! -f "$${SNAP}" ] || [ ! -s "$${SNAP}" ]; then
        echo "No valid snapshot at $${SNAP} (missing or empty). Skip restore.";
        exit 0;
      fi; echo "Restoring snapshot $${SNAP} -> collection=$${QDRANT_COLLECTION}"; curl -fsS -X DELETE "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" || true; curl -fsS -X POST "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}/snapshots/upload?priority=$${QDRANT_SNAPSHOT_PRIORITY}" -F "snapshot=@$${SNAP}"; i=0; until [ "$${i}" -ge 120 ]; do
        STATUS=$$(curl -fsS "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" | sed -n "s/.*\"status\":\"\\([^\"]*\\)\".*/\\1/p" | head -n 1 || true);
        if [ "$${STATUS}" = "green" ]; then
          echo "Snapshot restore completed.";
          exit 0;
        fi;
        i=$$((i+1));
        sleep 2;
      done; echo "Snapshot restore timeout"; exit 1;'
    networks:
      - callbot
    restart: "no"

  asr:
    build:
      context: ./nutrition-callbot
      dockerfile: asr/Dockerfile
    ports:
      - "${ASR_PORT:-50051}:50051"
    env_file: ./nutrition-callbot/.env
    networks:
      - callbot
    restart: unless-stopped

  brain:
    build:
      context: ./nutrition-callbot
      dockerfile: brain/Dockerfile
    ports:
      - "${BRAIN_PORT:-50052}:50052"
    env_file: ./nutrition-callbot/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    networks:
      - callbot
    depends_on:
      qdrant:
        condition: service_started
      qdrant-restore:
        condition: service_completed_successfully
    restart: unless-stopped

  tts:
    build:
      context: ./nutrition-callbot
      dockerfile: tts/Dockerfile
    ports:
      - "${TTS_PORT:-50053}:50053"
    env_file: ./nutrition-callbot/.env
    networks:
      - callbot
    restart: unless-stopped

  gateway:
    build:
      context: ./nutrition-callbot
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file: ./nutrition-callbot/.env
    networks:
      - callbot
    depends_on:
      - asr
      - brain
      - tts
    restart: unless-stopped

networks:
  callbot:
    driver: bridge

volumes:
  qdrant_data:
