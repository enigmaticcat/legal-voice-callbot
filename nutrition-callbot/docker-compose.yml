services:
  # ─── API Gateway (FastAPI) ─────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: callbot-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ASR_HOST=asr
      - ASR_PORT=50051
      - BRAIN_HOST=brain
      - BRAIN_PORT=50052
      - TTS_HOST=tts
      - TTS_PORT=50053
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      asr:
        condition: service_healthy
      brain:
        condition: service_healthy
      tts:
        condition: service_healthy
    networks:
      - callbot-net
    restart: unless-stopped

  qdrant-restore:
    image: curlimages/curl:8.7.1
    container_name: callbot-qdrant-restore
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-nutrition_articles}
      - QDRANT_SNAPSHOT_FILE=${QDRANT_SNAPSHOT_FILE:-nutrition_articles.snapshot}
      - QDRANT_SNAPSHOT_PRIORITY=${QDRANT_SNAPSHOT_PRIORITY:-snapshot}
    volumes:
      - ../snapshots:/snapshots:ro
    command: >
      sh -c '
        set -eu
        SNAP="/snapshots/$${QDRANT_SNAPSHOT_FILE}"
        if [ ! -f "$${SNAP}" ] || [ ! -s "$${SNAP}" ]; then
          echo "No valid snapshot at $${SNAP} (missing or empty). Skip restore."
          exit 0
        fi
        POINTS=$$(curl -fsS "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" 2>/dev/null \
          | sed -n "s/.*\"points_count\":\([0-9]*\).*/\1/p" | head -n 1 || echo "0")
        if [ "$${POINTS:-0}" -gt 0 ]; then
          echo "Collection $${QDRANT_COLLECTION} already has $${POINTS} points. Skip restore."
          exit 0
        fi
        echo "Restoring snapshot $${SNAP} -> collection=$${QDRANT_COLLECTION}"
        curl -fsS -X DELETE "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" || true
        curl -fsS -X POST "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}/snapshots/upload?priority=$${QDRANT_SNAPSHOT_PRIORITY}" \
          -F "snapshot=@$${SNAP}"
        i=0
        until [ "$${i}" -ge 300 ]; do
          STATUS=$$(curl -fsS "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" \
            | sed -n "s/.*\"status\":\"\\([^\"]*\\)\".*/\\1/p" | head -n 1 || true)
          if [ "$${STATUS}" = "green" ]; then
            echo "Snapshot restore completed."
            exit 0
          fi
          echo "  status=$${STATUS:-unknown} (i=$${i})"
          i=$$((i+1))
          sleep 2
        done
        echo "Snapshot restore timeout"
        exit 1
      '
    networks:
      - callbot-net
    restart: "no"

  # ─── ASR Worker ────────────────────────────────────────
  asr:
    build:
      context: .
      dockerfile: asr/Dockerfile
    container_name: callbot-asr
    ports:
      - "${ASR_PORT:-50051}:50051"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ASR_VAD_THRESHOLD=${ASR_VAD_THRESHOLD:-0.5}
      - ASR_VAD_MIN_SILENCE_MS=${ASR_VAD_MIN_SILENCE_MS:-500}
      - ASR_VAD_MIN_SPEECH_MS=${ASR_VAD_MIN_SPEECH_MS:-250}
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:50051/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Brain Worker (LLM + RAG) ─────────────────────────
  brain:
    build:
      context: .
      dockerfile: brain/Dockerfile
    container_name: callbot-brain
    ports:
      - "${BRAIN_PORT:-50052}:50052"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://llm:8000/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
      - LLM_API_KEY=${LLM_API_KEY:-local}
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379
      - RETRIEVAL_CACHE_ENABLED=${RETRIEVAL_CACHE_ENABLED:-true}
      - RETRIEVAL_CACHE_REQUIRED=${RETRIEVAL_CACHE_REQUIRED:-true}
      - RETRIEVAL_CACHE_TTL_SECONDS=${RETRIEVAL_CACHE_TTL_SECONDS:-86400}
      - CORPUS_VERSION=${CORPUS_VERSION:-nutrition-v1}
      - SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED:-true}
      - SEMANTIC_CACHE_COLLECTION=${SEMANTIC_CACHE_COLLECTION:-nutrition_retrieval_cache}
      - SEMANTIC_CACHE_THRESHOLD=${SEMANTIC_CACHE_THRESHOLD:-0.90}
      - SEMANTIC_CACHE_TTL_SECONDS=${SEMANTIC_CACHE_TTL_SECONDS:-604800}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-AITeamVN/Vietnamese_Embedding}
      - RERANKER_MODEL=${RERANKER_MODEL:-thanhtantran/Vietnamese_Reranker}
    depends_on:
      qdrant:
        condition: service_healthy
      qdrant-restore:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:50052/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── TTS Worker ────────────────────────────────────────
  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile
    container_name: callbot-tts
    ports:
      - "${TTS_PORT:-50053}:50053"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TTS_PRELOAD_MODEL=${TTS_PRELOAD_MODEL:-true}
      - REDIS_URL=redis://redis:6379
      - TTS_CACHE_ENABLED=${TTS_CACHE_ENABLED:-true}
      - TTS_CACHE_REQUIRED=${TTS_CACHE_REQUIRED:-true}
      - TTS_CACHE_TTL_SECONDS=${TTS_CACHE_TTL_SECONDS:-604800}
      - TTS_CACHE_MAX_BYTES=${TTS_CACHE_MAX_BYTES:-8000000}
      - TTS_CACHE_VERSION=${TTS_CACHE_VERSION:-v1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:50053/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Vector Database (RAG) ────────────────────────────
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.12.0}
    container_name: callbot-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Redis (Cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: callbot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Web Frontend (React + Vite) ──────────────────────
  web:
    build: ./web
    container_name: callbot-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - VITE_GATEWAY_URL=http://localhost:${GATEWAY_PORT:-8000}
    volumes:
      - ./web/src:/app/src
    networks:
      - callbot-net
    restart: unless-stopped

networks:
  callbot-net:
    driver: bridge

volumes:
  qdrant_data:
