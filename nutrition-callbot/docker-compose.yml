services:
  # ─── API Gateway (FastAPI) ─────────────────────────────
  gateway:
    build: ./gateway
    container_name: callbot-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ASR_HOST=asr
      - ASR_PORT=50051
      - BRAIN_HOST=brain
      - BRAIN_PORT=50052
      - TTS_HOST=tts
      - TTS_PORT=50053
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - callbot-net
    restart: unless-stopped

  qdrant-restore:
    image: curlimages/curl:8.7.1
    container_name: callbot-qdrant-restore
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-nutrition_articles}
      - QDRANT_SNAPSHOT_FILE=${QDRANT_SNAPSHOT_FILE:-nutrition_articles.snapshot}
      - QDRANT_SNAPSHOT_PRIORITY=${QDRANT_SNAPSHOT_PRIORITY:-snapshot}
    volumes:
      - ../snapshots:/snapshots:ro
    command: >
      sh -c ' set -eu; SNAP="/snapshots/$${QDRANT_SNAPSHOT_FILE}"; if [ ! -f "$${SNAP}" ] || [ ! -s "$${SNAP}" ]; then
        echo "No valid snapshot at $${SNAP} (missing or empty). Skip restore.";
        exit 0;
      fi; echo "Restoring snapshot $${SNAP} -> collection=$${QDRANT_COLLECTION}"; curl -fsS -X DELETE "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" || true; curl -fsS -X POST "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}/snapshots/upload?priority=$${QDRANT_SNAPSHOT_PRIORITY}" -F "snapshot=@$${SNAP}"; i=0; until [ "$${i}" -ge 120 ]; do
        STATUS=$$(curl -fsS "$${QDRANT_URL}/collections/$${QDRANT_COLLECTION}" | sed -n "s/.*\"status\":\"\\([^\"]*\\)\".*/\\1/p" | head -n 1 || true);
        if [ "$${STATUS}" = "green" ]; then
          echo "Snapshot restore completed.";
          exit 0;
        fi;
        i=$$((i+1));
        sleep 2;
      done; echo "Snapshot restore timeout"; exit 1;'
    networks:
      - callbot-net
    restart: "no"

  # ─── ASR Worker ────────────────────────────────────────
  asr:
    build: ./asr
    container_name: callbot-asr
    ports:
      - "${ASR_PORT:-50051}:50051"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Brain Worker (LLM + RAG) ─────────────────────────
  brain:
    build: ./brain
    container_name: callbot-brain
    ports:
      - "${BRAIN_PORT:-50052}:50052"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
    depends_on:
      qdrant:
        condition: service_healthy
      qdrant-restore:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── TTS Worker ────────────────────────────────────────
  tts:
    build: ./tts
    container_name: callbot-tts
    ports:
      - "${TTS_PORT:-50053}:50053"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Vector Database (RAG) ────────────────────────────
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: callbot-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:6333/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Redis (Cache) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: callbot-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callbot-net
    restart: unless-stopped

  # ─── Web Frontend (React + Vite) ──────────────────────
  web:
    build: ./web
    container_name: callbot-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - VITE_GATEWAY_URL=http://localhost:${GATEWAY_PORT:-8000}
    networks:
      - callbot-net
    restart: unless-stopped

networks:
  callbot-net:
    driver: bridge

volumes:
  qdrant_data:
