# Monitoring override — chạy từ thư mục nutrition-callbot/:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.monitoring.yml up --build -d
#
# Nếu host có NVIDIA GPU và muốn GPU metrics:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.monitoring.yml --profile gpu-monitoring up --build -d

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: callbot-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      gateway:
        condition: service_started
      asr:
        condition: service_started
      brain:
        condition: service_started
      tts:
        condition: service_started
    networks:
      - callbot-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: callbot-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - callbot-net
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: callbot-cadvisor
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - callbot-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: callbot-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - callbot-net
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: callbot-dcgm-exporter
    profiles:
      - gpu-monitoring
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    ports:
      - "${DCGM_EXPORTER_PORT:-9400}:9400"
    networks:
      - callbot-net
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
