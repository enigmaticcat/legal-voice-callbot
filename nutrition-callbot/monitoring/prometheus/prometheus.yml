global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: callbot-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8000
          - asr:50051
          - brain:50052
          - tts:50053

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: dcgm-exporter
    static_configs:
      - targets:
          - dcgm-exporter:9400
