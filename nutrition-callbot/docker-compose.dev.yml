# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  gateway:
    volumes:
      - ./gateway:/app
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  asr:
    volumes:
      - ./asr:/app

  brain:
    volumes:
      - ./brain:/app

  tts:
    volumes:
      - ./tts:/app

  web:
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
