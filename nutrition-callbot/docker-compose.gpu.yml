# GPU override — chạy từ thư mục nutrition-callbot/:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build -d
#
# Yêu cầu: nvidia-container-toolkit đã cài trên host

services:

  llm:
    image: vllm/vllm-openai:latest
    ports:
      - "8080:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen3-4B-Instruct-2507
      --dtype half
      --quantization bitsandbytes
      --load-format bitsandbytes
      --max-model-len 2048
      --gpu-memory-utilization 0.35
      --max-num-seqs 32
      --enable-prefix-caching
    networks:
      - callbot-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  brain:
    build:
      context: .
      dockerfile: brain/Dockerfile.gpu
    environment:
      - LLM_BASE_URL=http://llm:8000/v1
      - LLM_MODEL=Qwen/Qwen3-4B-Instruct-2507
      - LLM_API_KEY=local
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-AITeamVN/Vietnamese_Embedding}
      - RERANKER_MODEL=${RERANKER_MODEL:-thanhtantran/Vietnamese_Reranker}
    depends_on:
      llm:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  asr:
    build:
      context: .
      dockerfile: asr/Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - ASR_PROVIDER=cuda
      - ASR_REQUIRE_CUDA=true
      - ASR_VAD_THRESHOLD=${ASR_VAD_THRESHOLD:-0.5}
      - ASR_VAD_MIN_SILENCE_MS=${ASR_VAD_MIN_SILENCE_MS:-500}
      - ASR_VAD_MIN_SPEECH_MS=${ASR_VAD_MIN_SPEECH_MS:-250}

  tts:
    build:
      context: .
      dockerfile: tts/Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - TTS_DEVICE=cuda
      - TTS_REQUIRE_CUDA=true
