# GPU override — dùng kèm với docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Yêu cầu: nvidia-container-toolkit đã cài trên host
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html

services:

  llm:
    image: vllm/vllm-openai:latest
    ports:
      - "8080:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen3-4B-Instruct-2507
      --dtype half
      --quantization bitsandbytes
      --load-format bitsandbytes
      --max-model-len 4096
      --gpu-memory-utilization 0.45
      --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  asr:
    build:
      context: ./nutrition-callbot
      dockerfile: asr/Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - ASR_PROVIDER=cuda
      - ASR_REQUIRE_CUDA=true

  tts:
    build:
      context: ./nutrition-callbot
      dockerfile: tts/Dockerfile.gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    environment:
      - TTS_DEVICE=cuda
      - TTS_REQUIRE_CUDA=true

  brain:
    build:
      context: ./nutrition-callbot
      dockerfile: brain/Dockerfile.gpu
    environment:
      - LLM_BACKEND=openai
      - LLM_BASE_URL=http://llm:8000/v1
      - LLM_MODEL=Qwen/Qwen3-4B-Instruct-2507
    depends_on:
      llm:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
